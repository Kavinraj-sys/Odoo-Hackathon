{% extends "base.html" %}
{% block content %}
<h1>Resource Booking</h1>

<div class="card">
    <h3>Book a Shared Resource</h3>
    <form method="POST" action="{{ url_for('booking') }}">
        <input type="text" name="resource" placeholder="Resource Name (e.g. Conference Room B2)" required>
        <input type="datetime-local" name="start_time" required>
        <input type="datetime-local" name="end_time" required>
        <button type="submit">Book Resource</button>
    </form>
</div>

<h2>Current Bookings</h2>
<table>
    <thead>
        <tr>
            <th>Resource</th>
            <th>Booked By</th>
            <th>Start</th>
            <th>End</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for b in bookings %}
        <tr>
            <td>{{ b.resource }}</td>
            <td>{{ b.booked_by }}</td>
            <td>{{ b.start_time }}</td>
            <td>{{ b.end_time }}</td>
            <td><span class="status">{{ b.status }}</span></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
